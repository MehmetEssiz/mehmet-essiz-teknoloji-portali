<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehmet Eşsiz | Teknoloji Portalı</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
text-align:center;
padding:40px;
background:linear-gradient(90deg,#1e3a8a,#9333ea);
}

header h1{
margin:0;
font-size:42px;
}

header p{
color:#cbd5e1;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111827;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-content{
padding:15px;
}

h2{
color:#60a5fa;
font-size:18px;
}

p{
font-size:14px;
color:#cbd5e1;
}

.weather{
font-size:16px;
padding:10px;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>Mehmet Eşsiz</h1>
<p>Teknoloji & Bilişim Portalı</p>
</header>

<div class="container">

<!-- HAVA DURUMU -->
<div class="card">
<img src="https://images.unsplash.com/photo-1501630834273-4b5604d2ee31" />
<div class="card-content">
<h2>🌤 Hava Durumu</h2>
<div id="weather" class="weather">Yükleniyor...</div>
<button onclick="getWeather()">Yenile</button>
</div>
</div>

<!-- YAPAY ZEKA -->
<div class="card">
<img src="https://images.unsplash.com/photo-1677442136019-21780ecad995" />
<div class="card-content">
<h2>🤖 Yapay Zekâ</h2>
<p>AI teknolojileri artık hayatın her alanında kullanılıyor.</p>
</div>
</div>

<!-- SİBER GÜVENLİK -->
<div class="card">
<img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b" />
<div class="card-content">
<h2>🔐 Siber Güvenlik</h2>
<p>Veri güvenliği günümüzde çok daha önemli hale geldi.</p>
</div>
</div>

<!-- YAZILIM -->
<div class="card">
<img src="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5" />
<div class="card-content">
<h2>💻 Yazılım</h2>
<p>Web ve mobil uygulamalar modern dünyanın temelidir.</p>
</div>
</div>

</div>

<script>

// 🌤 CANLI HAVA DURUMU
async function getWeather(){

const url = "https://api.open-meteo.com/v1/forecast?latitude=41.01&longitude=28.97&current_weather=true";

const res = await fetch(url);
const data = await res.json();

const temp = data.current_weather.temperature;
const wind = data.current_weather.windspeed;

document.getElementById("weather").innerHTML =
"Sıcaklık: " + temp + "°C <br> Rüzgar: " + wind + " km/s";
}

getWeather();

</script>

</body>
</html>
