<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehmet Eşsiz | Teknoloji Portalı</title>

<style>

html{scroll-behavior:smooth}

body{
margin:0;
font-family:Arial;
background:#0a0f1e;
color:white;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:15px;
padding:15px;
background:rgba(10,15,30,0.9);
backdrop-filter:blur(10px);
z-index:999;
}

nav a{
color:white;
text-decoration:none;
padding:8px 12px;
border-radius:8px;
transition:.3s;
}

nav a:hover{
background:#3b82f6;
}

/* HEADER */
header{
padding-top:100px;
text-align:center;
padding-bottom:60px;
background:linear-gradient(135deg,#1e3a8a,#9333ea);
}

header h1{
font-size:50px;
margin:0;
}

header p{
color:#d1d5db;
}

/* SECTIONS */
section{
padding:80px 20px;
max-width:1100px;
margin:auto;
}

h2{
color:#60a5fa;
margin-bottom:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#111827;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-content{
padding:15px;
}

/* BUTTON */
button{
padding:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
margin-top:10px;
}

/* WEATHER + NEWS */
.box{
background:#111827;
padding:15px;
border-radius:15px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111827;
padding:20px;
border-radius:15px;
max-width:400px;
text-align:center;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
background:#020617;
color:#94a3b8;
}

</style>
</head>

<body>

<nav>
<a href="#home">Ana</a>
<a href="#weather">Hava</a>
<a href="#news">Haber</a>
<a href="#tech">Teknoloji</a>
</nav>

<header id="home">
<h1>Mehmet Eşsiz</h1>
<p>Gelişmiş Teknoloji & Bilişim Portalı</p>
</header>

<section id="weather">
<h2>🌤 Hava Durumu</h2>
<div class="box" id="weatherBox">Yükleniyor...</div>
<button onclick="getWeather()">Yenile</button>
</section>

<section id="news">
<h2>📰 Teknoloji Haberleri</h2>
<div class="box" id="newsBox">Yükleniyor...</div>
<button onclick="getNews()">Yenile</button>
</section>

<section id="tech">
<h2>💻 Teknolojiler</h2>

<div class="grid">

<div class="card" onclick="openModal('Yapay Zekâ','AI sistemleri insan gibi öğrenebilir.')">
<img src="https://images.unsplash.com/photo-1677442136019-21780ecad995">
<div class="card-content">Yapay Zekâ</div>
</div>

<div class="card" onclick="openModal('Siber Güvenlik','Veri güvenliği sistemlerin korunmasını sağlar.')">
<img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b">
<div class="card-content">Siber Güvenlik</div>
</div>

<div class="card" onclick="openModal('Bulut Bilişim','Veriler internet üzerinde saklanır.')">
<img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa">
<div class="card-content">Bulut Bilişim</div>
</div>

</div>
</section>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
<div class="modal-content">
<h3 id="modalTitle"></h3>
<p id="modalText"></p>
</div>
</div>

<footer>
© 2026 Mehmet Eşsiz | Teknoloji Portalı
</footer>

<script>

// 🌤 HAVA DURUMU
async function getWeather(){
const url="https://api.open-meteo.com/v1/forecast?latitude=41.01&longitude=28.97&current_weather=true";
const res=await fetch(url);
const data=await res.json();

document.getElementById("weatherBox").innerHTML=
"🌡 Sıcaklık: "+data.current_weather.temperature+"°C<br>💨 Rüzgar: "+data.current_weather.windspeed+" km/s";
}

// 📰 HABERLER
async function getNews(){
const url="https://api.rss2json.com/v1/api.json?rss_url=https://feeds.arstechnica.com/arstechnica/index";
const res=await fetch(url);
const data=await res.json();

let out="";
data.items.slice(0,5).forEach(n=>{
out+="• "+n.title+"<br>";
});

document.getElementById("newsBox").innerHTML=out;
}

// MODAL
function openModal(title,text){
document.getElementById("modal").style.display="flex";
document.getElementById("modalTitle").innerText=title;
document.getElementById("modalText").innerText=text;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

getWeather();
getNews();

</script>

</body>
</html>
